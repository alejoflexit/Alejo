name: Descargar LightData diario

on:
  schedule:
    - cron: '0 4 * * 1-6'
  workflow_dispatch:

jobs:
  descargar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        run: cd automation && npm install

      - name: Crear carpeta de descarga
        run: mkdir -p /tmp/lightdata

      - name: Ejecutar script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: cd automation && node descargar_lightdata.js
        timeout-minutes: 10
