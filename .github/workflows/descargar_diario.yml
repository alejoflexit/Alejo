name: Flexit Automatizacion Diaria

on:
  schedule:
    - cron: '0 4 * * 1-6'
  workflow_dispatch:

jobs:
  descargar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar deps
        run: cd automation && npm install

      - name: Crear carpeta
        run: mkdir -p /tmp/lightdata

      - name: Ejecutar
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: cd automation && node --version && node descargar_lightdata.js
        timeout-minutes: 10
