name: Flexit Carga Diaria v2

on:
  schedule:
    - cron: '0 4 * * 1-6'   # 1am AR — intento principal
    - cron: '0 5 * * 1-6'   # 2am AR — backup si el de 1am se retrasa
    - cron: '0 6 * * 1-6'   # 3am AR — backup adicional
  workflow_dispatch:

jobs:
  carga:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Verificar Node
        run: node --version
          
      - name: Instalar dependencias
        run: cd automation && rm -rf node_modules package-lock.json && npm install

      - name: Crear carpeta temporal
        run: mkdir -p /tmp/lightdata

      - name: Ejecutar descarga
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: cd automation && node descargar_lightdata.js
        timeout-minutes: 10
